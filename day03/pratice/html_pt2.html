<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Page Title</title>
    <link rel='stylesheet' href='main.css'>
</head>
<body>
    <form> 
        <p>
            카테고리
            <select>
                <option> 공지사항</option>
                <option> 문의</option>
            </select>
        </p>    
        <input type="text" placeholder="작성자"/>  <input type="text" placeholder="비밀번호" />
        <hr />
        <input type="text" placeholder="게시물 제목 입력"/>

        <textarea cols="50" rows="50" placeholder="게시물 내용 입력"> </textarea> <br />

        공개선택 <input type="radio" name="공개선택" /> 공개글
                <input type="radio" name="공개선택" /> 비공개글 <br />

        공유선택 <input type="checkbox" name="공유선택"/> 카카오톡
                <input type="checkbox" name="공유선택"/> 트위터
                <input type="checkbox" name="공유선택"/> 네이버카페 <br />

        작성일자 <input type="date" /> 작성시간 <input type="time" /> <br />
        <hr />
        첨부파일 <input type="file" /> <br />
        <button type="button"> 목록 보기 </button>
        <button type="button"> 글쓰기 </button>
        <button type="button"> 다시쓰기 </button>

    </form>

</html>
